name: Deploy Lambda Functions & FE

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

  workflow_dispatch:

  schedule:
    # KST = UTC+9 | 금일(2026-06-17) 14:35~18:00 KST = 05:35~09:00 UTC | 5분 간격
    - cron: '35,40,45,50,55 5 17 6 *'   # 14:35~14:55 KST
    - cron: '*/5 6,7,8 17 6 *'          # 15:00~17:55 KST
    - cron: '0 9 17 6 *'                # 18:00 KST

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  NODE_VERSION: '18'
  CLOUDFRONT_DISTRIBUTION_ID: EWR0TS02XHGPK
  S3_FE_PATH: s3://www.edumgt.co.kr/public/

jobs:
  # ── 1. Lambda 배포 (기존 job 유지) ───────────────────────────
  deploy:
    name: Package & Deploy Lambda
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - function_name_secret: LAMBDA_FUNCTION_COMPARE_FACES
            handler: lambda/compareFacesHandler.handler
            description: compareFacesHandler
          - function_name_secret: LAMBDA_FUNCTION_COMPARE_UPLOADED_FACES
            handler: lambda/compareUploadedFacesHandler.handler
            description: compareUploadedFacesHandler
          - function_name_secret: LAMBDA_FUNCTION_DETECT_TEXT
            handler: lambda/detectTextHandler.handler
            description: detectTextHandler
          - function_name_secret: LAMBDA_FUNCTION_UPLOAD_FACES
            handler: lambda/uploadFacesHandler.handler
            description: uploadFacesHandler

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install production dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Create deployment package (zip)
        working-directory: server
        run: |
          zip -r ../lambda-${{ matrix.description }}.zip \
            lambda/ \
            src/ \
            node_modules/ \
            package.json \
            --exclude "*.test.js" \
            --exclude "local/*" \
            --exclude "web/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to AWS Lambda
        env:
          FUNCTION_NAME: ${{ secrets[matrix.function_name_secret] }}
        run: |
          if [ -z "$FUNCTION_NAME" ]; then
            echo "⚠️  Secret '${{ matrix.function_name_secret }}' not set — skipping deploy for ${{ matrix.description }}"
            exit 0
          fi
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://lambda-${{ matrix.description }}.zip

      - name: Update Lambda handler configuration
        env:
          FUNCTION_NAME: ${{ secrets[matrix.function_name_secret] }}
        run: |
          if [ -z "$FUNCTION_NAME" ]; then
            echo "⚠️  Secret '${{ matrix.function_name_secret }}' not set — skipping config for ${{ matrix.description }}"
            exit 0
          fi
          aws lambda wait function-updated \
            --function-name "$FUNCTION_NAME"
          aws lambda update-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --handler "${{ matrix.handler }}" \
            --runtime nodejs18.x

  # ── 2. FE 배포 + CloudFront 무효화 ───────────────────────────
  deploy-fe:
    name: Deploy FE to S3 & Invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync FE to S3
        run: |
          aws s3 sync server/web/public/ ${{ env.S3_FE_PATH }} \
            --region ${{ env.AWS_REGION }} \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        id: invalidate
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/public/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_OUTPUT

      - name: Wait for CloudFront invalidation to complete
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --id ${{ steps.invalidate.outputs.invalidation_id }}
